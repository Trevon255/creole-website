<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice | Creole Jamaican Artistry</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @media print { .no-print { display: none !important; } }
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .invoice-box { max-width: 800px; margin: auto; padding: 30px; border: 1px solid #eee; background: #fff; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th { background: #f2f2f2; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .total-section { text-align: right; margin-top: 20px; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="no-print" style="text-align: center; margin-bottom: 20px;">
            <button onclick="window.print()" style="background:#28a745; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Print Invoice</button>
            <button onclick="window.location.href='index.html'" style="background:#666; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Return Home</button>
        </div>
        
        <div class="invoice-box">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h1 style="color:#d63384; margin:0; font-size: 2.5rem;">INVOICE</h1>
                    <p style="margin-top:10px;"><strong>Invoice #:</strong> <span id="displayInvNum">---</span></p>
                    <p><strong>Date:</strong> <span id="displayDate">---</span></p>
                </div>
                <div style="text-align: right;">
                    <h3 style="margin:0;">Creole Jamaican Artistry</h3>
                    <p style="color:#666;">Kingston, Jamaica<br>TRN: 123-456-789</p>
                </div>
            </div>

            <div style="margin: 30px 0; padding: 20px; background: #f9f9f9; border-radius: 8px; border-left: 5px solid #d63384;">
                <h4 style="margin-top:0;">Customer Details:</h4>
                <p><strong>Name:</strong> <span id="displayShipName">---</span></p>
                <p><strong>TRN:</strong> <span id="displayUserTRN">---</span></p>
                <p><strong>Address:</strong> <span id="displayShipAddr">---</span></p>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Item Description</th>
                        <th>Qty</th>
                        <th>Unit Price</th>
                        <th>Sub-total</th>
                    </tr>
                </thead>
                <tbody id="invoiceItemsBody"></tbody>
            </table>

            <div class="total-section">
                <p>Sub-total: <span id="displaySubtotal">$0.00</span></p>
                <p style="color: green;">Discount (5%): <span id="displayDiscount">-$0.00</span></p>
                <p>GCT (15%): <span id="displayTax">$0.00</span></p>
                <p style="font-size: 1.4rem; font-weight: bold; color: #d63384; border-top: 2px solid #eee; display: inline-block; padding-top: 10px;">
                    Grand Total: <span id="displayGrandTotal">$0.00</span>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. Check if we are viewing a PAST invoice from the Dashboard
            const historyData = JSON.parse(localStorage.getItem("CurrentViewingInvoice"));
            
            // 2. Check if we are viewing a NEW order just placed
            const cart = JSON.parse(localStorage.getItem("ShoppingCart"));
            const customerName = localStorage.getItem("CustomerName");
            const userTRN = localStorage.getItem("UserTRN");
            const address = localStorage.getItem("CustomerAddress");

            const fmt = (v) => "$" + (v || 0).toLocaleString(undefined, {minimumFractionDigits: 2}) + " JMD";
            let dataToDisplay = null;

            if (historyData) {
                // We are in "Dashboard View" mode
                dataToDisplay = {
                    num: historyData.invoiceNum,
                    date: historyData.date,
                    name: historyData.customerName,
                    trn: historyData.customerTrn,
                    addr: historyData.customerAddress || "Kingston, Jamaica",
                    items: historyData.items,
                    total: historyData.totalCost
                };
                // Clean up so it doesn't stay in memory forever
                localStorage.removeItem("CurrentViewingInvoice");
            } else if (cart) {
                // We are in "Just Checked Out" mode
                dataToDisplay = {
                    num: "CR-" + Math.floor(Math.random() * 900000 + 100000),
                    date: new Date().toLocaleDateString(),
                    name: customerName || "Valued Customer",
                    trn: userTRN || "N/A",
                    addr: address || "Kingston, Jamaica",
                    items: cart.items,
                    total: cart.totalCost,
                    sub: cart.subtotal,
                    disc: cart.discounts,
                    tax: cart.taxes
                };
            }

            if (dataToDisplay) {
                document.getElementById("displayInvNum").innerText = dataToDisplay.num;
                document.getElementById("displayDate").innerText = dataToDisplay.date;
                document.getElementById("displayShipName").innerText = dataToDisplay.name;
                document.getElementById("displayUserTRN").innerText = dataToDisplay.trn;
                document.getElementById("displayShipAddr").innerText = dataToDisplay.addr;

                const tbody = document.getElementById("invoiceItemsBody");
                tbody.innerHTML = dataToDisplay.items.map(item => `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.quantity}</td>
                        <td>$${item.price.toLocaleString()}</td>
                        <td>$${(item.price * item.quantity).toLocaleString()}</td>
                    </tr>
                `).join('');

                // Calculate/Display Totals
                if (historyData) {
                    // For history, we recalculate totals based on the saved grand total
                    let sub = dataToDisplay.total / 1.0925; // Reverse math for estimation
                    document.getElementById("displaySubtotal").innerText = fmt(sub);
                    document.getElementById("displayDiscount").innerText = "-" + fmt(sub * 0.05);
                    document.getElementById("displayTax").innerText = fmt(sub * 0.95 * 0.15);
                } else {
                    document.getElementById("displaySubtotal").innerText = fmt(dataToDisplay.sub);
                    document.getElementById("displayDiscount").innerText = "-" + fmt(dataToDisplay.disc);
                    document.getElementById("displayTax").innerText = fmt(dataToDisplay.tax);
                }
                
                document.getElementById("displayGrandTotal").innerText = fmt(dataToDisplay.total);

                // Auto-print only for new orders
                if (!historyData) {
                    setTimeout(() => { window.print(); }, 800);
                }
            } else {
                alert("No invoice data found.");
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
