<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice | Creole Jamaican Artistry</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @media print { .no-print { display: none !important; } }
        .invoice-box { max-width: 800px; margin: auto; padding: 30px; border: 1px solid #eee; background: #fff; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th { background: #f2f2f2; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="no-print" style="text-align: center; margin: 20px;">
            <button onclick="window.print()" style="background:#28a745; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">Print Invoice</button>
            <button onclick="window.location.href='index.html'" style="background:#666; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">Return Home</button>
        </div>
        
        <div class="invoice-box">
            <div style="display: flex; justify-content: space-between;">
                <div>
                    <h1 style="color:#d63384; margin:0;">INVOICE</h1>
                    <p><strong>Invoice #:</strong> <span id="displayInvNum">---</span></p>
                    <p><strong>Date:</strong> <span id="displayDate">---</span></p>
                </div>
                <div style="text-align: right;">
                    <h3>Creole Jamaican Artistry</h3>
                    <p>Kingston, Jamaica</p>
                    <p>TRN: 123-456-789</p>
                </div>
            </div>

            <div style="margin: 30px 0; padding: 15px; background: #f9f9f9; border-radius: 8px;">
                <h4>Customer Details:</h4>
                <p><strong>Name:</strong> <span id="displayShipName">---</span></p>
                <p><strong>TRN:</strong> <span id="displayUserTRN">---</span></p>
                <p><strong>Address:</strong> <span id="displayShipAddr">---</span></p>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Item Description</th>
                        <th>Qty</th>
                        <th>Unit Price</th>
                        <th>Sub-total</th>
                    </tr>
                </thead>
                <tbody id="invoiceItemsBody"></tbody>
            </table>

            <div style="text-align: right;">
                <p>Sub-total: <span id="displaySubtotal">$0.00</span></p>
                <p style="color: green;">Discount (5%): <span id="displayDiscount">-$0.00</span></p>
                <p>GCT (15%): <span id="displayTax">$0.00</span></p>
                <p style="font-size: 1.2rem; font-weight: bold; color: #d63384;">Grand Total: <span id="displayGrandTotal">$0.00</span></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const cart = JSON.parse(localStorage.getItem("ShoppingCart"));
            const customerName = localStorage.getItem("CustomerName");
            const userTRN = localStorage.getItem("UserTRN");
            const address = localStorage.getItem("CustomerAddress");

            if (cart) {
                document.getElementById("displayInvNum").innerText = "CR-" + Math.floor(Math.random() * 900000 + 100000);
                document.getElementById("displayDate").innerText = new Date().toLocaleDateString();
                document.getElementById("displayShipName").innerText = customerName || "Valued Customer";
                document.getElementById("displayUserTRN").innerText = userTRN || "N/A";
                document.getElementById("displayShipAddr").innerText = address || "Kingston, Jamaica";

                const tbody = document.getElementById("invoiceItemsBody");
                tbody.innerHTML = cart.items.map(item => `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.quantity}</td>
                        <td>$${item.price.toLocaleString()}</td>
                        <td>$${(item.price * item.quantity).toLocaleString()}</td>
                    </tr>
                `).join('');

                const fmt = (v) => "$" + v.toLocaleString(undefined, {minimumFractionDigits: 2}) + " JMD";
                document.getElementById("displaySubtotal").innerText = fmt(cart.subtotal);
                document.getElementById("displayDiscount").innerText = "-" + fmt(cart.discounts);
                document.getElementById("displayTax").innerText = fmt(cart.taxes);
                document.getElementById("displayGrandTotal").innerText = fmt(cart.totalCost);

                setTimeout(() => { window.print(); }, 500);
            }
        });
    </script>
</body>
</html>
