<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Creole Jamaican Artistry</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* This ensures your grid actually looks like a grid */
        #product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        .shopping-cart-totals {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
            max-width: 400px;
            margin-left: auto;
        }
        .total-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Creole Jamaican Artistry</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Shopping Bag</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2>Our Collection</h2>
        
        <div id="product-grid"></div>

        <div class="shopping-cart-totals">
            <h3>Quick Summary</h3>
            <div class="total-item">
                <label>Sub-total</label>
                <span id="cart-subtotal">$0.00 JMD</span>
            </div>
            <div class="total-item">
                <label>Discount (5%)</label>
                <span id="cart-discount">$0.00 JMD</span>
            </div>
            <div class="total-item">
                <label>GCT (15%)</label>
                <span id="cart-tax">$0.00 JMD</span>
            </div>
            <div class="total-item" style="border-top: 2px solid #ddd; padding-top: 10px; margin-top: 10px;">
                <label><strong>Estimated Total</strong></label>
                <span id="cart-total" style="color:#d63384; font-weight:bold;">$0.00 JMD</span>
            </div>
            <br>
            <a href="cart.html" class="btn" style="display: block; text-align: center; text-decoration: none; background: #333; color: white; padding: 10px; border-radius: 5px;">View Full Shopping Bag</a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
