<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Creole Jamaican Artistry</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #ffffff; color: #333; }
        .login-box { max-width: 400px; margin: 80px auto; padding: 30px; border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-login { background: #d63384; color: white; }
        .btn-cancel { background: #6c757d; color: white; }
        .error-text { color: #dc3545; font-size: 0.9em; margin-top: 15px; min-height: 20px; text-align: center; font-weight: bold; }
        .reset-p { text-align: center; margin-top: 20px; font-size: 0.9em; }
        .reset-p a { color: #d63384; text-decoration: none; font-weight: bold; }
        
        header { text-align: center; padding: 20px; border-bottom: 1px solid #f0f0f0; }
        .logo img { height: 60px; width: auto; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="Assets/creole.jpg" alt="Creole Logo">
    </div>
</header>

<main>
    <div class="login-box">
        <h3 style="text-align: center; text-transform: uppercase; letter-spacing: 1px;">Welcome Back</h3>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="loginTrn">TRN (XXX-XXX-XXX)</label>
                <input type="text" 
                       id="loginTrn" 
                       placeholder="000-000-000" 
                       pattern="\d{3}-\d{3}-\d{3}" 
                       title="TRN must be in format 000-000-000" 
                       required>
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" 
                       id="loginPassword" 
                       placeholder="Enter your password"
                       required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-login">Login</button>
                <button type="reset" class="btn btn-cancel">Cancel</button>
            </div>

            <p id="errorMsg" class="error-text"></p>
        </form>

        <div class="reset-p">
            <p>Forgot Password? <a href="reset.html">Reset Password</a></p>
            <p>New here? <a href="register.html">Create an Account</a></p>
        </div>
    </div>
</main>

<script>
    let attempts = 0;

    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const trnInput = document.getElementById('loginTrn').value;
        const passInput = document.getElementById('loginPassword').value;
        const errorDisplay = document.getElementById('errorMsg');

        const registrationData = JSON.parse(localStorage.getItem('RegistrationData'));

        if (registrationData && registrationData.trn === trnInput && registrationData.password === passInput) {
            alert("Login Successful! Welcome to Creole.");
            localStorage.setItem("isLoggedIn", "true");
            window.location.href = "products.html";
        } else {
            attempts++;
            if (attempts >= 3) {
                alert("Account Locked! Too many failed attempts.");
                window.location.href = "locked.html";
            } else {
                errorDisplay.innerText = `Invalid TRN or Password. Attempt ${attempts} of 3.`;
            }
        }
    });
</script>

</body>
</html>
