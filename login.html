<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Creole</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<header>
    <h2>Creole Jamaican Artistry</h2>
</header>

<main>
    <div class="login-box">
        <h3>Welcome Back</h3>

        <form id="loginForm" autocomplete="off">

            <div class="form-group">
                <label for="loginTrn">TRN</label>
                <input type="text"
                       id="loginTrn"
                       placeholder="000-000-000"
                       pattern="\d{3}-\d{3}-\d{3}"
                       title="TRN must be in format 000-000-000"
                       required>
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password"
                       id="loginPassword"
                       required>
            </div>

            <button type="submit" class="btn">Sign In</button>
            <button type="reset" class="btn">Cancel</button>

            <p id="errorMsg" class="error"></p>

        </form>

        <p>
            Forgot Password?
            <a href="#" onclick="resetPassword()">Reset</a>
        </p>

        <p>
            New here? <a href="register.html">Register</a>
        </p>
    </div>
</main>

<script src="../js/auth.js"></script>

</body>
</html>
