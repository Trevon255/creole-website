<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Bag | Creole Jamaican Artistry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Shopping Bag</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Your Shopping Bag</h2>
            <a href="products.html" style="text-decoration:none; font-size:2rem; color:#888;">&times;</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Sub-total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="cart-table-body">
                </tbody>
        </table>

        <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
            <div class="summary-box" style="width: 300px; padding: 15px; background: #f9f9f9; border-radius: 8px;">
                <p>Sub-total: <span id="cart-subtotal">$0.00 JMD</span></p>
                <p style="color: green;">Discount (5%): <span id="cart-discount">-$0.00 JMD</span></p>
                <p>GCT (15%): <span id="cart-tax">$0.00 JMD</span></p>
                <hr>
                <h3 style="color: #d63384;">Total: <span id="cart-total">$0.00 JMD</span></h3>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
            <button class="btn" onclick="clearAll()" style="background: #e74c3c;">Clear All</button>
            
            <a href="products.html" class="btn" style="background: #95a5a6;">Close</a>
            
            <a href="checkout.html" class="btn" style="background: #2ecc71;">Check Out</a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
