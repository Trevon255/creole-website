<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Bag | Niketa Muschette</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-container { padding: 40px; background: #fff; border-radius: 15px; margin: 20px auto; max-width: 1000px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #f4cfdf; color: #555; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .totals-box { float: right; width: 300px; padding: 20px; background: #fff5f8; border-radius: 10px; border: 1px dashed #f4cfdf; }
        .total-row { display: flex; justify-content: space-between; margin: 10px 0; }
        .grand-total { font-weight: bold; font-size: 1.2rem; color: #d63384; border-top: 1px solid #ccc; pt: 10px; }
        .actions { clear: both; display: flex; justify-content: flex-end; gap: 10px; padding-top: 20px; }
        .btn-clear { background: #6c757d !important; }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html" class="active">Cart</a></li>
                <li><a href="checkout.html">Checkout</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="cart-container">
            <p style="font-size: 0.8rem; color: #999;">Designer: Niketa Muschette</p>
            <h2>Your Shopping Bag</h2>
            
            <table>
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="cart-table-body">
                    </tbody>
            </table>

            <div class="totals-box">
                <div class="total-row"><span>Sub-total:</span> <span id="cart-subtotal">$0.00 JMD</span></div>
                <div class="total-row"><span style="color: green;">Discount (5%):</span> <span id="cart-discount">-$0.00 JMD</span></div>
                <div class="total-row"><span>GCT (15%):</span> <span id="cart-tax">$0.00 JMD</span></div>
                <div class="total-row grand-total"><span>Total:</span> <span id="cart-total">$0.00 JMD</span></div>
            </div>

            <div class="actions">
                <button class="btn btn-clear" onclick="localStorage.removeItem('ShoppingCart'); location.reload();">Clear All</button>
                <button class="btn" onclick="window.location.href='checkout.html'">Check Out</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
