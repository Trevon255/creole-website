<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Bag | Creole Jamaican Artistry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Shopping Bag</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2>Your Shopping Bag</h2>
        <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
            <thead>
                <tr style="text-align: left; border-bottom: 2px solid #f4cfdf;">
                    <th style="padding: 15px;">Item Name</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Sub-total</th>
                </tr>
            </thead>
            <tbody id="cart-table-body"></tbody>
        </table>

        <div style="display: flex; justify-content: flex-end; margin-top: 30px;">
            <div class="order-summary-box" style="width: 350px; padding: 20px; background: #fffcfd; border: 1px solid #f4cfdf; border-radius: 10px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>Sub-total:</span>
                    <span id="cart-subtotal">$0.00 JMD</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px; color: green;">
                    <span>Discount (5%):</span>
                    <span id="cart-discount">-$0.00 JMD</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>GCT (15%):</span>
                    <span id="cart-tax">$0.00 JMD</span>
                </div>
                <hr>
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem;">
                    <span>Total:</span>
                    <span id="cart-total" style="color: #d63384;">$0.00 JMD</span>
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px;">
            <button class="btn" style="background: #888;" onclick="emptyCart()">Empty Bag</button>
            <a href="checkout.html" class="btn">Proceed to Checkout</a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
