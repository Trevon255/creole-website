
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Creole Jamaican Artistry</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #ffffff; color: #333; margin: 0; }
        
        header { text-align: center; padding: 20px; border-bottom: 1px solid #f0f0f0; }
        .logo img { height: 60px; width: auto; }

        .registration-container { max-width: 500px; margin: 40px auto; padding: 30px; border: 1px solid #eee; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-transform: uppercase; letter-spacing: 1px; color: #222; margin-bottom: 25px; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        .button-group { display: flex; gap: 10px; margin-top: 25px; }
        .btn { padding: 14px 20px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; text-align: center; flex: 1; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: #d63384; color: white; }
        .btn-primary:hover { background: #b82b6e; }
        .btn-secondary { background: #f4f4f4; color: #666; }
        .btn-secondary:hover { background: #e2e2e2; }
        
        .login-link { text-align: center; margin-top: 20px; font-size: 14px; }
        .login-link a { color: #d63384; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="Assets/creole.jpg" alt="Creole Logo">
    </div>
</header>

<main>
    <div class="registration-container">
        <h2 style="text-align: center;">Create Account</h2>

        <form id="registrationForm" autocomplete="off">

            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" pattern="[A-Za-z]+" title="Only letters allowed" required>
            </div>

            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" pattern="[A-Za-z]+" title="Only letters allowed" required>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" required>
            </div>

            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="876-000-0000" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label for="trn">TRN (000-000-000)</label>
                <input type="text" id="trn" placeholder="123-456-789" pattern="\d{3}-\d{3}-\d{3}" title="TRN must be in format 000-000-000" required>
            </div>

            <div class="form-group">
                <label for="password">Password (Min 8 characters)</label>
                <input type="password" id="password" minlength="8" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-primary">Create Account</button>
                <button type="reset" class="btn btn-secondary">Clear</button>
            </div>

            <p class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </p>
        </form>
    </div>
</main>

<script>
    document.getElementById('registrationForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Validation: Passwords must match
        if (password !== confirmPassword) {
            alert("Passwords do not match. Please try again.");
            return;
        }

        // Calculate Age from DOB for Dashboard Statistics
        const dobValue = document.getElementById('dob').value;
        const dobDate = new Date(dobValue);
        const today = new Date();
        let age = today.getFullYear() - dobDate.getFullYear();
        const m = today.getMonth() - dobDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < dobDate.getDate())) {
            age--;
        }

        // Create the user object
        const newUser = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            dob: dobValue,
            age: age,
            gender: document.getElementById('gender').value,
            phone: document.getElementById('phone').value,
            trn: document.getElementById('trn').value,
            email: document.getElementById('email').value,
            password: password
        };

        // 1. Update the Running List of All Registered Users (for Dashboard)
        let allUsers = JSON.parse(localStorage.getItem('AllUsers')) || [];
        allUsers.push(newUser);
        localStorage.setItem('AllUsers', JSON.stringify(allUsers));

        // 2. Save the most recent registration (for Login validation)
        localStorage.setItem('RegistrationData', JSON.stringify(newUser));

        alert("Registration Successful! Please login with your TRN.");
        window.location.href = "login.html";
    });
</script>

</body>
</html>
