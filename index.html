<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog | Creole Jamaican Artistry</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Catalog Specific Layout */
        header { 
            background: white; 
            padding: 20px; 
            text-align: center; 
            border-bottom: 2px solid #d63384; 
            position: sticky; 
            top: 0; 
            z-index: 100;
        }
        .nav-links { margin-top: 10px; }
        .nav-links a { 
            margin: 0 15px; 
            text-decoration: none; 
            color: #333; 
            font-weight: bold; 
        }
        .nav-links a:hover { color: #d63384; }

        .catalog-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        /* Grid setup for your JavaScript displayProductGrid function */
        #product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
        }

        .welcome-banner { 
            background: #fdf2f8; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 30px; 
            text-align: center; 
            border-left: 5px solid #d63384;
        }
    </style>
</head>
<body>

<header>
    <h1>Creole Jamaican Artistry</h1>
    <nav class="nav-links">
        <a href="index.html">Shop</a>
        <a href="cart.html">My Bag</a>
        <a href="dashboard.html">Admin</a>
        <a href="login.html" onclick="logout()">Logout</a>
    </nav>
</header>

<main class="catalog-container">
    <div class="welcome-banner">
        <h2>Welcome to the Collection</h2>
        <p>Explore hand-crafted Jamaican treasures designed with passion.</p>
    </div>

    <div id="product-grid">
        </div>
</main>

<footer style="text-align: center; padding: 40px; color: #888;">
    <p>&copy; 2026 Creole Jamaican Artistry. Developed by Niketa Muschette.</p>
</footer>

<script src="script.js"></script>
<script>
    // Simple logout function to clear the session
    function logout() {
        localStorage.removeItem("isLoggedIn");
        alert("You have been logged out.");
    }
</script>

</body>
</html>
