<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Creole Jamaican Artistry</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stat-card { background: #f9f9f9; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 5px solid #d63384; }
        .invoice-item { border-bottom: 1px solid #ddd; padding: 10px 0; }
        input { padding: 8px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #d63384; color: white; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Admin Dashboard</h1>

        <section>
            <h2>User Statistics</h2>
            <div id="genderFrequency" class="stat-card"></div>
            <div id="ageFrequency" class="stat-card"></div>
        </section>

        <hr>

        <section>
            <h2>Invoice Management</h2>
            <div style="margin-bottom: 20px;">
                <input type="text" id="searchTRN" placeholder="Enter TRN (000-000-000)">
                <button onclick="ShowInvoices()">Search Invoices (Console)</button>
                <button onclick="GetUserInvoices()" style="background:#333;">Display on Page</button>
            </div>
            
            <div id="invoiceDisplayArea">
                <p><em>Search results will appear here...</em></p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
    <script>
        // Run stats automatically when dashboard loads
        document.addEventListener("DOMContentLoaded", () => {
            ShowUserFrequency();
        });
    </script>
</body>
</html>
