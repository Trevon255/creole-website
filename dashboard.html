<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Creole Jamaican Artistry</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; background-color: #f9f9f9; }
        .container { max-width: 900px; margin: 40px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card { 
            background: #fff; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border-left: 5px solid #d63384; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 1.1rem;
            color: #333;
        }
        .controls { margin-bottom: 20px; background: #eee; padding: 20px; border-radius: 8px; }
        input { padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background: #d63384; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #b02a6b; }
        .nav-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #d63384; font-weight: bold; }
        h1, h2 { color: #222; }
        h3 { margin-top: 30px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="nav-link">← Back to Store</a>
        <h1>Admin Dashboard</h1>
        <p>Manage users and track sales performance below.</p>

        <section>
            <h2>User Statistics</h2>
            <div id="genderStatsDisplay" class="stat-card">
                <p><em>Loading gender stats...</em></p>
            </div>
            <div id="ageStatsDisplay" class="stat-card">
                <p><em>Loading age stats...</em></p>
            </div>
        </section>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">

        <section>
            <h2>Invoice Management</h2>
            <div class="controls">
                <p><strong>Search by TRN:</strong></p>
                <input type="text" id="trnInput" placeholder="Enter TRN (e.g., 123-456-789)">
                
                <button id="displayResultsBtn" onclick="ShowInvoices()">Display Results</button>
            </div>
            
            <h3>Search Results</h3>
            <div id="searchResults">
                <p style="color: #888;">Enter a TRN and click "Display Results" to view invoices.</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
