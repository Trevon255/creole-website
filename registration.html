<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Creole</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .registration-container { max-width: 500px; margin: 50px auto; padding: 20px; border: 1px solid #eee; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; text-align: center; flex: 1; font-weight: bold; }
        .btn-primary { background: #d63384; color: white; }
        .btn-secondary { background: #eee; color: #333; }
    </style>
</head>
<body>

<header style="text-align: center; padding: 20px;">
    <h2>Creole Jamaican Artistry</h2>
</header>

<main>
    <div class="registration-container">
        <h2 style="text-align: center;">Create Account</h2>

        <form id="registrationForm" autocomplete="off" onsubmit="saveRegistration(event)">

            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" pattern="[A-Za-z]+" title="Only letters allowed" required>
            </div>

            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" pattern="[A-Za-z]+" title="Only letters allowed" required>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" required>
            </div>

            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" pattern="[0-9]{7,15}" title="Enter a valid phone number" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label for="trn">TRN (000-000-000)</label>
                <input type="text" id="trn" placeholder="123-456-789" pattern="\d{3}-\d{3}-\d{3}" title="TRN must be in format 000-000-000" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" minlength="8" title="Minimum 8 characters" required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-primary">Register</button>
                <a href="index.html" class="btn btn-secondary">Cancel</a>
            </div>

        </form>
    </div>
</main>

<script>
    function saveRegistration(event) {
        event.preventDefault(); 

        // 1. Collect form data INCLUDING the password
        const newUser = {
            firstName: document.getElementById("firstName").value,
            lastName: document.getElementById("lastName").value,
            dob: document.getElementById("dob").value,
            gender: document.getElementById("gender").value,
            email: document.getElementById("email").value,
            trn: document.getElementById("trn").value,
            password: document.getElementById("password").value // Fixed: Now it saves the password!
        };

        // 2. Load existing data or start a new array
        let users = JSON.parse(localStorage.getItem("RegistrationData")) || [];

        // 3. Add the new user
        users.push(newUser);

        // 4. Save to Local Storage
        localStorage.setItem("RegistrationData", JSON.stringify(users));

        // 5. Success alert and redirect to Login
        alert("Registration Successful, " + newUser.firstName + "! You can now log in.");
        window.location.href = "login.html"; 
    }
</script>

</body>
</html>
