<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Creole</title>
    <link rel="stylesheet" href="../style.css">

    <style>
        .registration-container {
            max-width: 500px;
            margin: 40px auto;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 8px;
        }

        .btn {
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h2>Creole Jamaican Artistry</h2>
</header>

<main>
    <div class="registration-container">
        <h2>Register</h2>

        <form id="registrationForm" autocomplete="off">

            <div class="form-group">
                <label>First Name</label>
                <input type="text"
                       id="firstName"
                       pattern="[A-Za-z]+"
                       title="Only letters allowed"
                       required>
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text"
                       id="lastName"
                       pattern="[A-Za-z]+"
                       title="Only letters allowed"
                       required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="dob" required>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select id="gender" required>
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel"
                       id="phone"
                       pattern="[0-9]{7,15}"
                       title="Enter valid phone number"
                       required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>TRN (000-000-000)</label>
                <input type="text"
                       id="trn"
                       placeholder="123-456-789"
                       pattern="\d{3}-\d{3}-\d{3}"
                       title="TRN must be in format 000-000-000"
                       required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password"
                       id="password"
                       minlength="8"
                       title="Minimum 8 characters"
                       required>
            </div>

            <button type="submit" class="btn">Register</button>
            <button type="reset" class="btn">Cancel</button>

        </form>
    </div>
</main>

<script src="../js/auth.js"></script>

</body>
</html>
