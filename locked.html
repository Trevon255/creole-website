<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Locked | Creole Jamaican Artistry</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fcfcfc;
            color: #333;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .locked-container {
            max-width: 450px;
            padding: 40px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .icon-box {
            font-size: 50px;
            margin-bottom: 20px;
            color: #d63384; /* Matches your brand pink */
        }

        .logo img {
            height: 50px;
            margin-bottom: 25px;
        }

        h2 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-size: 22px;
            color: #222;
        }

        p {
            line-height: 1.6;
            color: #666;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            padding: 14px 30px;
            background-color: #2d2d2d;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.3s ease;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .btn-home:hover {
            background-color: #000;
            transform: translateY(-2px);
        }

        .support-text {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="locked-container">
        <div class="logo">
            <img src="Assets/creole.jpg" alt="Creole Logo">
        </div>

        <div class="icon-box">🔒</div>
        
        <h2>Access Restricted</h2>
        <p>
            For your security, this account has been locked because the maximum of <strong>three (3) login attempts</strong> was exceeded.
        </p>

        <a href="index.html" class="btn-home">Return to Home</a>

        <p class="support-text">
            If you believe this is an error, please contact our support team or try again later.
        </p>
    </div>

</body>
</html>
