<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | Niketa Muschette</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h2>Secure Checkout</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
            
            <section>
                <h3>Shipping Details</h3>
                <form onsubmit="generateInvoice(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="custName" placeholder="e.g. Niketa Muschette" required>
                    </div>
                    <div class="form-group">
                        <label>Delivery Address</label>
                        <textarea id="custAddress" rows="3" placeholder="Enter street and parish" required></textarea>
                    </div>
                    <button type="submit" class="btn">Confirm Order</button>
                </form>
            </section>

            <section style="background: #f9f9f9; padding: 25px; border-radius: 10px;">
                <h3>Order Summary</h3>
                <p>Handled by: Niketa Muschette</p>
                <hr>
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.3rem;">
                    <span>Amount Due:</span>
                    <span id="summary-total">$0.00 JMD</span>
                </div>
            </section>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
