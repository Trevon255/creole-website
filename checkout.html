<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | Creole Jamaican Artistry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Creole Jamaican Artistry</h1>
    </header>

    <main class="container">
        <h2>Secure Checkout</h2>
        <div style="display: flex; gap: 40px; margin-top: 20px;">
            <div style="flex: 1;">
                <h3>1. Shipping & Payment</h3>
                <label>Full Name</label>
                <input type="text" id="cust-name" style="width:100%; padding:10px; margin-bottom:15px;">
                
                <label>Address</label>
                <textarea id="cust-address" style="width:100%; padding:10px; margin-bottom:15px;"></textarea>
                
                <label>Amount Being Paid ($)</label>
                <input type="number" id="amount-paid" placeholder="Enter amount" style="width:100%; padding:10px; margin-bottom:20px;">

                <button onclick="generateInvoice()" style="width:100%; background:#27ae60; color:white; padding:15px; border:none; cursor:pointer; font-weight:bold;">Confirm Checkout</button>
                <button onclick="window.location.href='cart.html'" style="width:100%; background:#95a5a6; color:white; padding:10px; border:none; cursor:pointer; margin-top:10px;">Cancel (Back to Bag)</button>
            </div>

            <div style="flex: 1; background: #f9f9f9; padding: 25px; border-radius: 10px; border: 1px solid #eee;">
                <h3>2. Order Summary</h3>
                <p>Sub-total: <span id="cart-subtotal">$0.00 JMD</span></p>
                <p>Discount (5%): <span id="cart-discount">$0.00 JMD</span></p>
                <p>GCT (15%): <span id="cart-tax">$0.00 JMD</span></p>
                <hr>
                <h4>Total Due: <span id="checkout-amount" style="color:#d63384; font-size:1.5rem;">$0.00 JMD</span></h4>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
