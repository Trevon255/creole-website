<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | Creole</title>
    <link rel="icon" type="image/jpeg" href="Assets/creole.jpg">
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .order-summary-box { background: var(--gray); padding: 25px; border-radius: 10px; border: 1px solid var(--creole-pink); }
        .checkout-actions { display: flex; gap: 15px; margin-top: 30px; }
        .btn-cancel { background: transparent; border: 1px solid #ccc; color: #666; }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><img src="Assets/creole.jpg" alt="Logo" id="mainLogo"></a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="checkout.html">Checkout</a></li>
                <li><a href="invoice.html">My Invoices</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2>Secure Checkout</h2>
        <div class="checkout-grid">
            <div>
                <h3>Shipping Details</h3>
                <form id="checkoutForm" onsubmit="confirmOrder(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="custName" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label>Shipping Address</label>
                        <input type="text" id="custAddress" placeholder="Enter street address" required>
                    </div>
                    <div class="form-group">
                        <label>Amount Being Paid ($ JMD)</label>
                        <input type="text" value="10,160.25" disabled style="background:#eee;">
                    </div>
                    
                    <div class="checkout-actions">
                        <button type="button" class="btn btn-cancel" onclick="cancelOrder()">Cancel</button>
                        <button type="submit" class="btn">Confirm Order</button>
                    </div>
                </form>
            </div>

            <div class="order-summary-box">
                <h3>Order Summary</h3>
                <p>Items: 2</p>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #ddd;">
                <p style="font-size: 1.2rem; font-weight: bold;">Total Cost: $10,160.25 JMD</p>
            </div>
        </div>
    </main>

    <script>
    // 1. Initialize the user's invoice array (simulated user session)
    let user = {
        invoices: []
    };

    function confirmOrder(event) {
        event.preventDefault(); 

        // 2. Capture Shipping Details from the form
        const name = document.getElementById("custName").value;
        const address = document.getElementById("custAddress").value;

        // 3. Generate the Invoice Object with all required details
        const newInvoice = {
            companyName: "Creole Jamaican Artistry",
            date: new Date().toLocaleDateString('en-JM'),
            invoiceNumber: "INV-" + Date.now(), // Generates a unique ID
            trn: "123-456-789",
            shippingInfo: {
                name: name,
                address: address
            },
            // Item details matching your cart summary
            items: [
                { name: "Rustic Burlap Tote", qty: 1, price: 3500.00, discount: "5%" },
                { name: "Artisan Serving Tray", qty: 1, price: 5800.00, discount: "5%" }
            ],
            subtotal: 9300.00,
            taxes: 1325.25, // GCT 15%
            totalCost: 10160.25
        };

        // 4. Append to the user's array of invoices
        user.invoices.push(newInvoice);

        // 5. Store to localStorage under the key 'AllInvoices'
        // We fetch existing data first, then add the new invoice to the list
        let allInvoices = JSON.parse(localStorage.getItem("AllInvoices")) || [];
        allInvoices.push(newInvoice);
        localStorage.setItem("AllInvoices", JSON.stringify(allInvoices));

        // 6. Display "Sent to Email" message and confirm order
        alert(
            "Success! Your order " + newInvoice.invoiceNumber + " has been confirmed.\n\n" +
            "A copy of your invoice has been sent to your email address."
        );

        // 7. Redirect to the invoice display page
        window.location.href = "invoice.html"; 
    }

    function cancelOrder() {
        if(confirm("Do you want to cancel the checkout and return to your cart?")) {
            window.location.href = "cart.html";
        }
    }
</script>
</body>
</html>
